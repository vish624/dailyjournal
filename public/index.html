<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Journal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <i class="fas fa-book-open"></i>
                    Daily Journal
                </h1>
                <div class="header-controls">
                    <button id="searchBtn" class="icon-btn" title="Search entries">
                        <i class="fas fa-search"></i>
                    </button>
                    <button id="themeToggle" class="icon-btn" title="Toggle theme">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Search Bar -->
        <div id="searchContainer" class="search-container hidden">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search your entries...">
                <button id="clearSearch" class="icon-btn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Calendar View -->
            <div id="calendarView" class="calendar-view">
                <div class="calendar-header">
                    <button id="prevMonth" class="nav-btn">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <h2 id="currentMonth" class="month-title"></h2>
                    <button id="nextMonth" class="nav-btn">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                
                <div class="calendar-grid">
                    <div class="weekdays">
                        <div class="weekday">Sun</div>
                        <div class="weekday">Mon</div>
                        <div class="weekday">Tue</div>
                        <div class="weekday">Wed</div>
                        <div class="weekday">Thu</div>
                        <div class="weekday">Fri</div>
                        <div class="weekday">Sat</div>
                    </div>
                    <div id="calendarDays" class="calendar-days"></div>
                </div>
            </div>

            <!-- Entry Editor -->
            <div id="entryEditor" class="entry-editor hidden">
                <div class="editor-header">
                    <button id="backToCalendar" class="icon-btn">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="entry-date" id="entryDate"></div>
                    <div class="editor-actions">
                        <button id="saveEntry" class="save-btn">
                            <i class="fas fa-save"></i>
                            Save
                        </button>
                    </div>
                </div>

                <div class="editor-content">
                    <input type="text" id="entryTitle" class="entry-title" placeholder="Entry title (optional)">
                    
                    <div class="formatting-toolbar">
                        <button type="button" class="format-btn" data-command="bold" title="Bold">
                            <i class="fas fa-bold"></i>
                        </button>
                        <button type="button" class="format-btn" data-command="italic" title="Italic">
                            <i class="fas fa-italic"></i>
                        </button>
                        <button type="button" class="format-btn" data-command="underline" title="Underline">
                            <i class="fas fa-underline"></i>
                        </button>
                        <div class="toolbar-divider"></div>
                        <button type="button" class="format-btn" data-command="insertUnorderedList" title="Bullet List">
                            <i class="fas fa-list-ul"></i>
                        </button>
                        <button type="button" class="format-btn" data-command="insertOrderedList" title="Numbered List">
                            <i class="fas fa-list-ol"></i>
                        </button>
                    </div>

                    <div id="entryContent" class="entry-content" contenteditable="true" placeholder="What's on your mind today?"></div>

                    <div class="entry-metadata">
                        <div class="photo-section">
                            <label>Photos:</label>
                            <div class="photo-controls">
                                <input type="file" id="photoInput" accept="image/*" multiple style="display: none;">
                                <button type="button" id="addPhotoBtn" class="photo-btn">
                                    <i class="fas fa-camera"></i>
                                    Add Photos
                                </button>
                            </div>
                            <div id="photoPreview" class="photo-preview"></div>
                        </div>

                        <div class="mood-selector">
                            <label>Mood:</label>
                            <div class="mood-options">
                                <button type="button" class="mood-btn" data-mood="1" title="Very Sad">😢</button>
                                <button type="button" class="mood-btn" data-mood="2" title="Sad">😔</button>
                                <button type="button" class="mood-btn" data-mood="3" title="Neutral">😐</button>
                                <button type="button" class="mood-btn" data-mood="4" title="Happy">😊</button>
                                <button type="button" class="mood-btn" data-mood="5" title="Very Happy">😄</button>
                            </div>
                        </div>

                        <div class="tags-input">
                            <label>Tags:</label>
                            <input type="text" id="entryTags" placeholder="Add tags separated by commas">
                        </div>

                        <div class="word-count">
                            <span id="wordCount">0 words</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Entry Viewer -->
            <div id="entryViewer" class="entry-viewer hidden">
                <div class="viewer-header">
                    <button id="backToCalendarFromViewer" class="icon-btn">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="entry-date" id="viewerDate"></div>
                    <div class="viewer-actions">
                        <button id="editEntry" class="edit-btn">
                            <i class="fas fa-edit"></i>
                            Edit
                        </button>
                        <button id="deleteEntry" class="delete-btn">
                            <i class="fas fa-trash"></i>
                            Delete
                        </button>
                    </div>
                </div>

                <div class="viewer-content">
                    <h2 id="viewerTitle" class="viewer-title"></h2>
                    <div id="viewerPhotos" class="viewer-photos"></div>
                    <div id="viewerContent" class="viewer-text"></div>
                    
                    <div class="viewer-metadata">
                        <div id="viewerMood" class="mood-display"></div>
                        <div id="viewerTags" class="tags-display"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
        </div>

        <!-- Toast Notifications -->
        <div id="toastContainer" class="toast-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
